<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Image Gallery</title>
    <link rel="stylesheet" href="assets/task2.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/task2.js" defer></script>
</head>
<body>
    <div id="gallery">
        <h2>Image Gallery</h2>
        <div class="image-container">
            <img id="galleryImage" src="assets/img_1.jpg" alt="Gallery Image">
        </div>
        <p id="imageCaption">Caption: Image 1</p>
        <div class="controls">
            <button id="prevBtn">Previous</button>
            <button id="nextBtn">Next</button>
        </div>
    </div>
</body>
</html>
